
# .github/workflows/ci.yml
#
# Purpose:
# Continuous integration — runs on every push to
# dev, testing, and staging branches.
#
# Responsibilities:
# - Run full test suite
# - Lint and type check
# - Fail fast on any broken code
#
# This workflow is the quality gate for all branches.
# Code that fails here must not be promoted.


name: CI

on:
  push:
    branches:
      - dev
      - testing
      - staging
  pull_request:
    branches:
      - main
      - staging
      - testing

jobs:

  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    env:
      PYTHONPATH: ${{ github.workspace }}

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v \
            --cov=engine \
            --cov=schemas \
            --cov-report=term-missing \
            --cov-fail-under=40

  lint:
    name: Lint and Type Check
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683      # v4.2.2 with fetch-depth: 0 to get full history for version parsing

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55   # v5.5.0
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          pip install -e ".[dev]"

      - name: Ruff lint
        run: |
          ruff check .

      - name: Ruff format check
        run: |
          ruff format --check .