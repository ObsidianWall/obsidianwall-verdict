
# .github/workflows/verdict-ci.yml
#
# ObsidianWall Verdict — CI Pipeline
#
# Triggers:
# - Push to main or dev branches
# - Pull requests targeting main
#
# Jobs:
# - lint:        ruff + bandit static analysis
# - test:        pytest with coverage enforcement
# - action-test: integration test — exercises the full
#                GitHub Action against a real sample plan
# - build:       package build verification

name: ObsidianWall Verdict CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:

  # ===================================================
  # STATIC ANALYSIS
  # ===================================================

  lint:
    name: Static Analysis
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683                 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55             # v5.5.0
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          pip install ruff bandit

      - name: Ruff lint
        run: |
          ruff check engine/ schemas/ audit/ cli/

      - name: Ruff format check
        run: |
          ruff format --check .

      - name: Bandit security scan
        run: |
          bandit -r engine/ schemas/ audit/ -ll -f txt

  # ===================================================
  # TEST SUITE
  # Runs full test suite — unit + integration tests.
  # Coverage measured across all tests combined.
  # ===================================================

  test:
    name: Test Suite
    runs-on: ubuntu-24.04
    needs: lint
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683                 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55             # v5.5.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run full test suite with coverage
        run: |
          python -m pytest tests/ -v \
            --cov=engine \
            --cov=schemas \
            --cov-report=term-missing \
            --cov-fail-under=40

  # ===================================================
  # ACTION SELF-TEST
  #
  # Integration test — exercises the complete GitHub
  # Action against real sample files.
  #
  # Tests:
  # - Governance decision produced correctly
  # - Risk score computed and non-zero
  # - Decision ID issued for audit trail
  #
  # This is Verdict's integration test layer.
  # It tests the full system from the outside,
  # exactly as engineers will use it.
  # ===================================================

  action-test:
    name: Action Integration Test
    runs-on: ubuntu-24.04
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683                 # v4.2.2

      - name: Run Verdict — over budget (expect DENY)
        id: verdict_deny
        uses: ./
        with:
          plan:         samples/terraform_plan.json
          policy:       policies/cost/basic_budget.yaml
          role:         engineer
          fail_on_deny: "false"

      - name: Assert DENY decision
        run: |
          DECISION="${{ steps.verdict_deny.outputs.decision }}"
          echo "Decision: $DECISION"
          if [[ "$DECISION" != "DENY_WITH_OVERRIDE" && "$DECISION" != "DENY" ]]; then
            echo "Expected DENY or DENY_WITH_OVERRIDE, got: $DECISION"
            exit 1
          fi
          echo "✅ Correct governance decision: $DECISION"

      - name: Assert risk score computed
        run: |
          RISK="${{ steps.verdict_deny.outputs.risk_score }}"
          echo "Risk score: $RISK"
          if [[ -z "$RISK" || "$RISK" == "0" ]]; then
            echo "Expected non-zero risk score"
            exit 1
          fi
          echo "✅ Risk score: $RISK/100"

      - name: Assert decision ID issued
        run: |
          ID="${{ steps.verdict_deny.outputs.decision_id }}"
          echo "Decision ID: $ID"
          if [[ -z "$ID" ]]; then
            echo "Expected decision_id in output"
            exit 1
          fi
          echo "✅ Decision ID: $ID"

  # ===================================================
  # BUILD VERIFICATION
  # ===================================================

  build:
    name: Build Verification
    runs-on: ubuntu-24.04
    needs: action-test

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683                 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55             # v5.5.0
        
        with:
          python-version: "3.13"

      - name: Install build tools
        run: |
          pip install build

      - name: Build package
        run: |
          python -m build

      - name: Verify CLI entry point
        run: |
          pip install -e .
          verdict --help