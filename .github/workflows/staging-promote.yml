
# .github/workflows/staging-promote.yml
#
# Purpose:
# Staging validation and automated promotion to main.
#
# Triggers on push to staging.
#
# Pipeline:
# 1. Run full test suite
# 2. Validate package build (twine check)
# 3. If all pass → open PR staging → main automatically
#
# The PR requires your approval.
# Main release pipeline runs after you merge.
#
# This keeps a human in the loop while automating
# the mechanical parts of the promotion workflow.


name: Staging Validation and Promote

on:
  push:
    branches:
      - staging

permissions:
  contents: write
  pull-requests: write

jobs:

  # =================================================
  # JOB 1 — VALIDATE
  # Full test suite + build validation
  # =================================================

  validate:
    name: Staging Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683                 # v4.2.2 

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55             # v5.5.0 
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install build twine

      - name: Run tests
        run: |
          python -m pytest tests/ --tb=short -v

      - name: Build package
        run: |
          rm -rf dist/ build/ *.egg-info/
          python -m build

      - name: Validate build
        run: |
          twine check dist/*

      - name: Read version
        id: version
        run: |
          VERSION=$(python -c "
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          with open('pyproject.toml', 'rb') as f:
              d = tomllib.load(f)
          print(d['project']['version'])
          ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Staging validated at version $VERSION"

  # =================================================
  # JOB 2 — PROMOTE
  # Opens PR staging → main automatically
  # Runs only after validate passes
  # =================================================

  promote:
    name: Open PR to Main
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683                 # v4.2.2 
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(python -c "
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          with open('pyproject.toml', 'rb') as f:
              d = tomllib.load(f)
          print(d['project']['version'])
          ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check for existing PR
        id: pr_check
        run: |
          EXISTING=$(gh pr list \
            --base main \
            --head staging \
            --state open \
            --json number \
            --jq length)
          echo "existing=$EXISTING" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open promotion PR
        if: steps.pr_check.outputs.existing == '0'
        run: |
          gh pr create \
            --base main \
            --head staging \
            --title "release: promote staging → main v${{ steps.version.outputs.version }}" \
            --body "## Automated Promotion

          Staging validation passed for **v${{ steps.version.outputs.version }}**.

          ### Checks completed
          - ✅ All tests passing
          - ✅ Package builds cleanly
          - ✅ twine check passed

          ### What happens after merge
          - Git tag \`v${{ steps.version.outputs.version }}\` created
          - GitHub release published
          - PyPI updated automatically

          **Review and merge to release.**"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: PR already exists
        if: steps.pr_check.outputs.existing != '0'
        run: |
          echo "PR staging → main already open. Skipping creation."