# .github/workflows/release.yml
#
# Purpose:
# Automated release pipeline.
# Triggers on push to main.
#
# Pipeline:
# 1. Run tests one final time
# 2. Read version from pyproject.toml
# 3. Check if tag already exists
#    If yes  → version not bumped, skip release
#    If no   → proceed with release
# 4. Build package
# 5. Create git tag
# 6. Create GitHub release
# 7. Upload to PyPI
#
# Required secret:
#   PYPI_API_TOKEN  ← Settings → Secrets → Actions
#
# Version is the single source of truth.
# Bump version in pyproject.toml to trigger a release.
# Push to main without bumping → tests run, no release.


name: Release Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:

  # =================================================
  # JOB 1 — TEST
  # Final test run before release
  # =================================================

  test:
    name: Final Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683        # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55    # v5.0.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/ --tb=short

  # =================================================
  # JOB 2 — RELEASE
  # Only runs if version tag does not exist yet
  # =================================================

  release:
    name: Tag, Release, and Publish
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683        # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55    # v5.5.0
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          pip install build twine tomli

      # -------------------------------------------
      # Read version from pyproject.toml
      # Single source of truth
      # -------------------------------------------

      - name: Read version
        id: version
        run: |
          VERSION=$(python -c "
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          with open('pyproject.toml', 'rb') as f:
              d = tomllib.load(f)
          print(d['project']['version'])
          ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      # -------------------------------------------
      # Skip if tag already exists
      # Means version was not bumped — no release
      # -------------------------------------------

      - name: Check if tag exists
        id: tag_check
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists. No release needed."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG is new. Proceeding with release."
          fi

      # -------------------------------------------
      # Build package
      # -------------------------------------------

      - name: Build package
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          rm -rf dist/ build/ *.egg-info/
          python -m build

      - name: Validate build
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          twine check dist/*

      # -------------------------------------------
      # Create git tag
      # -------------------------------------------

      - name: Create tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git config user.name  "ObsidianWall-admin"
          git config user.email "hello@obsidianwall.com"
          git tag -a "$TAG" -m "ObsidianWall Verdict $TAG"
          git push origin "$TAG"

      # -------------------------------------------
      # Create GitHub release
      # Pre-release if version contains alpha or beta
      # -------------------------------------------

      - name: Create GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65    # v2.6.2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ObsidianWall Verdict v${{ steps.version.outputs.version }}
          prerelease: >-
            ${{
              contains(steps.version.outputs.version, 'alpha') ||
              contains(steps.version.outputs.version, 'beta')
            }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz

      # -------------------------------------------
      # Upload to PyPI
      # -------------------------------------------

      - name: Upload to PyPI
        if: steps.tag_check.outputs.exists == 'false'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/*

      - name: Release summary
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          echo "✅ Released ObsidianWall Verdict v${{ steps.version.outputs.version }}"
          echo "📦 PyPI: https://pypi.org/project/obsidianwall-verdict/"
          echo "🏷️  Tag: v${{ steps.version.outputs.version }}"