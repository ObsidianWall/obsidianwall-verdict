
# policies/cost/basic_budget.yaml
#
# Purpose:
# Basic budget guardrail policy.
#
# Governance model:
# - Soft budget enforcement
# - Budget owner notified on breach
# - Engineering lead notified simultaneously
# - Override available without approval requirement
# - Preserves engineering velocity

apiVersion: obsidianwall.io/v1
kind: Policy

metadata:
  name: basic_budget_verdict
  version: "0.2"
  owner: team-alpha
  description: "Prevents infrastructure spend overruns with accountable governance routing"

spec:

  inputs:
    - estimated_cost
    - current_spend

  parameters:
    budget:
      amount: 50
      period: monthly
      scope: project:default
      owner: team-alpha
      flexibility: soft
      override_allowed: true

  conditions:
    - id: budget_check
      expression: "(current_spend + estimated_cost) <= budget.amount"
      description: "Monthly spend cap enforcement"

  decision:
    allow: ALLOW
    deny: DENY_WITH_OVERRIDE
    warn: ALLOW_WITH_NOTIFICATION

  # ---------------------------------------------------
  # GOVERNANCE WORKFLOW
  # ---------------------------------------------------
  # Defines stakeholder routing and approval requirements.
  # Notifications fire simultaneously to all targets.
  # Budget owner holds override authority without
  # formal approval for soft-budget policies.

  governance:
    severity: medium

    notifications:
      - role: budget_owner
        channel: email
      - role: engineering_lead
        channel: slack

    approvals:
      required:
        - budget_owner

  override:
    roles:
      - budget_owner
    requires_approval: false

  actions:
    - type: notify
      severity: high
      message: "Budget threshold exceeded. Governance workflow triggered."

    - type: log
      severity: info
      message: "Decision recorded in audit trail."
