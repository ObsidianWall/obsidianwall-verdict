
# policies/cost/basic_budget.yaml

# Basic Budget Guardrail Policy




apiVersion: obsidianwall.io/v1
kind: Policy

metadata:
  name: basic_budget_verdict
  version: 0.2
  owner: team-alpha
  description: "Prevents infra spend overruns"

spec:
  inputs:
    - estimated_cost
    - current_spend

  parameters:
    budget:
      amount: 50
      period: monthly
      scope: project:default
      owner: team-alpha
      flexibility: soft
      override_allowed: true

  conditions:
    - id: budget_check
      expression: "(current_spend + estimated_cost) <= budget.amount"
      description: "Monthly spend cap enforcement"

  decision:
    allow: ALLOW
    deny: DENY
    warn: WARN

  override:
    roles:
      - budget_owner

  actions:
    - type: notify
      severity: high
      message: "Budget exceeded"

    - type: log
      severity: info
      message: "Decision recorded"