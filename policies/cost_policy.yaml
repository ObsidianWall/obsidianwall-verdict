
# policies/cost_policy.yaml

# Cost Policy for Budget Guardrail

policy:
  name: budget_guardrail
  version: 0.1

inputs:
  - estimated_cost
  - current_spend

parameters:
  max_budget: 50

conditions:
  - "(current_spend + estimated_cost) <= max_budget"

decision:
  allow: "ALLOW"
  deny: "DENY"

actions:
  - type: notify
    message: "Budget exceeded"